<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ STORE - LIVE CATALOG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0b0f1a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .drop { position: absolute; bottom: 100%; width: 1px; height: 25px; background: rgba(0, 191, 255, 0.3); animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen pb-24">
    <div class="rain" id="rain-container"></div>

    <header class="p-10 text-center">
        <h1 class="text-5xl font-black italic tracking-tighter text-blue-500">XYZ STORE</h1>
        <p class="text-[10px] text-slate-500 tracking-[0.4em] uppercase mt-2">Live Public Catalog</p>
    </header>

    <main class="max-w-4xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-6" id="product-list">
        </main>

    <button onclick="bukaModal()" class="fixed bottom-8 right-8 w-16 h-16 bg-blue-600 rounded-full text-3xl font-bold shadow-lg z-40 hover:scale-110 transition active:scale-95">+</button>

    <div id="modal-form" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden z-50 p-6 overflow-y-auto">
        <div class="max-w-md mx-auto bg-slate-900 border border-slate-800 p-8 rounded-3xl">
            <h2 class="text-xl font-bold mb-6 text-blue-400">POST PRODUK BARU</h2>
            <div class="space-y-4">
                <input type="text" id="n-game" placeholder="Nama Game (AKUN FC)" class="w-full p-3 bg-slate-800 rounded-xl outline-none border border-slate-700">
                <input type="text" id="h-game" placeholder="Harga (Contoh: 150.000)" class="w-full p-3 bg-slate-800 rounded-xl outline-none border border-slate-700">
                <textarea id="d-game" placeholder="Deskripsi/Spek..." class="w-full p-3 bg-slate-800 rounded-xl outline-none border border-slate-700 h-20"></textarea>
                <input type="file" id="f-input" accept="image/*" class="w-full text-sm text-slate-400">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="uploadKeFirebase()" id="btn-save" class="flex-grow bg-blue-600 p-3 rounded-xl font-bold">POSTING SEKARANG</button>
                <button onclick="tutupModal()" class="px-6 bg-slate-700 p-3 rounded-xl font-bold">X</button>
            </div>
        </div>
    </div>

    <script>
        // ISI DENGAN CONFIG FIREBASE LU SENDIRI, MIN!
        const firebaseConfig = {
            apiKey: "ISI_DI_SINI",
            authDomain: "ISI_DI_SINI",
            databaseURL: "ISI_DI_SINI",
            projectId: "ISI_DI_SINI",
            storageBucket: "ISI_DI_SINI",
            messagingSenderId: "ISI_DI_SINI",
            appId: "ISI_DI_SINI"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function bukaModal() { document.getElementById('modal-form').classList.remove('hidden'); }
        function tutupModal() { document.getElementById('modal-form').classList.add('hidden'); }

        async function uploadKeFirebase() {
            const btn = document.getElementById('btn-save');
            const file = document.getElementById('f-input').files[0];
            const nama = document.getElementById('n-game').value;
            const harga = document.getElementById('h-game').value;
            const desc = document.getElementById('d-game').value;

            if(!file || !nama || !harga) return alert("Lengkapi data, Min!");

            btn.innerText = "SABAR, LAGI PROSES...";
            btn.disabled = true;

            // Kompres & Konversi Foto ke Base64 (Simpel buat Database)
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async (e) => {
                const imgBase64 = e.target.result;
                
                // Simpan ke Realtime Database
                const newPost = db.ref('products').push();
                await newPost.set({ nama, harga, desc, foto: imgBase64, timestamp: Date.now() });

                alert("Berhasil Post! Semua pembeli sekarang bisa lihat.");
                location.reload();
            };
        }

        // Tampilkan Data Secara Real-Time untuk SEMUA ORANG
        db.ref('products').orderByChild('timestamp').on('value', (snapshot) => {
            const container = document.getElementById('product-list');
            container.innerHTML = '';
            snapshot.forEach((child) => {
                const item = child.val();
                container.innerHTML += `
                    <div class="glass rounded-3xl overflow-hidden flex flex-col group relative">
                        <img src="${item.foto}" class="w-full h-56 object-cover bg-black">
                        <div class="p-5">
                            <h3 class="font-bold text-lg text-blue-400 italic">${item.nama}</h3>
                            <p class="text-slate-500 text-xs mt-1 mb-4">${item.desc}</p>
                            <div class="flex justify-between items-center pt-4 border-t border-white/5">
                                <span class="font-black text-xl text-green-400 font-mono text-xl">Rp${item.harga}</span>
                                <button onclick="window.open('https://wa.me/6285183122570?text=Min, beli ${item.nama}')" class="bg-blue-600 px-6 py-2 rounded-xl text-xs font-bold">BELI</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        // Animasi Hujan
        const rainContainer = document.getElementById('rain-container');
        for (let i = 0; i < 30; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            rainContainer.appendChild(drop);
        }
    </script>
</body>
</html>
