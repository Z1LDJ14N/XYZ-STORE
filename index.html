<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ STORE - Katalog Akun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: white; overflow-x: hidden; }
        .rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .drop { position: absolute; bottom: 100%; width: 1px; height: 25px; background: rgba(0, 191, 255, 0.4); animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen p-4">

    <div class="rain" id="rain-container"></div>

    <div class="max-w-4xl mx-auto text-center my-10">
        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 italic">XYZ STORE</h1>
        <p class="text-slate-400 mt-2 tracking-widest uppercase text-xs">Premium Account & Digital Services</p>
    </div>

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6" id="display-produk">
        </div>

    <div id="admin-panel" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50">
        <div class="glass p-8 rounded-2xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4">Tambah Produk Baru</h2>
            <input type="text" id="p-nama" placeholder="Contoh: AKUN FC" class="w-full p-3 mb-3 bg-slate-800 rounded border border-slate-700 outline-none">
            <input type="text" id="p-harga" placeholder="Harga (Contoh: 50.000)" class="w-full p-3 mb-3 bg-slate-800 rounded border border-slate-700 outline-none">
            <textarea id="p-desc" placeholder="Deskripsi Akun..." class="w-full p-3 mb-4 bg-slate-800 rounded border border-slate-700 outline-none h-24"></textarea>
            <div class="flex gap-2">
                <button onclick="simpanProduk()" class="flex-1 bg-blue-600 p-3 rounded font-bold">POST AKUN</button>
                <button onclick="tutupAdmin()" class="bg-red-600 p-3 rounded font-bold italic">X</button>
            </div>
            <button onclick="hapusSemua()" class="w-full mt-4 text-xs text-slate-500 underline">Reset Semua Produk</button>
        </div>
    </div>

    <footer class="mt-20 text-center border-t border-slate-800 pt-10 pb-20">
        <p class="text-slate-500 text-sm mb-4">Payment: Dana / Gopay (085183122570)</p>
        <button onclick="bukaWA('Bantuan Operator')" class="glass px-6 py-2 rounded-full text-sm hover:bg-blue-500/20 transition">
            Hubungi Operator: 085183122570
        </button>
        <div onclick="cekKlik()" class="mt-10 text-slate-800 cursor-default select-none">XYZ STORE</div>
    </footer>

    <script>
        const WA_NOMOR = "6285183122570";
        let klikCounter = 0;

        // Load Produk dari LocalStorage
        function loadStore() {
            const listProduk = JSON.parse(localStorage.getItem('xyz_products')) || [];
            const container = document.getElementById('display-produk');
            container.innerHTML = '';

            listProduk.forEach((item, index) => {
                container.innerHTML += `
                    <div class="glass p-6 rounded-2xl flex flex-col justify-between hover:scale-105 transition transform">
                        <div>
                            <h3 class="text-xl font-bold text-blue-400 mb-2">${item.nama}</h3>
                            <p class="text-slate-400 text-sm mb-6 italic">"${item.desc}"</p>
                        </div>
                        <div class="flex justify-between items-center border-t border-slate-700 pt-4">
                            <span class="text-lg font-mono font-bold text-green-400">Rp${item.harga}</span>
                            <button onclick="beli('${item.nama}', '${item.harga}')" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm font-bold">BELI</button>
                        </div>
                    </div>
                `;
            });
        }

        function simpanProduk() {
            const nama = document.getElementById('p-nama').value;
            const harga = document.getElementById('p-harga').value;
            const desc = document.getElementById('p-desc').value;

            if(!nama || !harga) return alert("Min, isi dulu nama ama harganya!");

            const listProduk = JSON.parse(localStorage.getItem('xyz_products')) || [];
            listProduk.push({ nama, harga, desc });
            localStorage.setItem('xyz_products', JSON.stringify(listProduk));
            
            // Reset Form & Refresh
            document.getElementById('p-nama').value = '';
            document.getElementById('p-harga').value = '';
            document.getElementById('p-desc').value = '';
            tutupAdmin();
            loadStore();
        }

        function beli(nama, harga) {
            const teks = `Halo Min, saya mau beli *${nama}* seharga *Rp${harga}*. Ready stoknya?`;
            bukaWA(teks);
        }

        function bukaWA(pesan) {
            window.open(`https://wa.me/${WA_NOMOR}?text=${encodeURIComponent(pesan)}`, '_blank');
        }

        // Fitur Rahasia buka Admin
        function cekKlik() {
            klikCounter++;
            if(klikCounter >= 3) {
                document.getElementById('admin-panel').classList.remove('hidden');
                klikCounter = 0;
            }
        }

        function tutupAdmin() { document.getElementById('admin-panel').classList.add('hidden'); }
        
        function hapusSemua() {
            if(confirm("Hapus semua stok, Min?")) {
                localStorage.removeItem('xyz_products');
                loadStore();
                tutupAdmin();
            }
        }

        // Animasi Hujan
        const rainContainer = document.getElementById('rain-container');
        for (let i = 0; i < 60; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            rainContainer.appendChild(drop);
        }

        loadStore();
    </script>
</body>
</html>
