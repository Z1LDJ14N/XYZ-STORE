<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ AI Premium - Advanced AI Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
        }

        /* 3D Canvas Background */
        #canvas3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Main Container */
        .container {
            display: flex;
            height: 100vh;
            gap: 20px;
            padding: 20px;
            z-index: 1;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 340px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            animation: slideInLeft 0.8s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px) rotateY(20deg);
            }
            to {
                opacity: 1;
                transform: translateX(0) rotateY(0);
            }
        }

        .sidebar-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .ai-avatar {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            position: relative;
            animation: float3d 6s ease-in-out infinite;
            perspective: 1000px;
        }

        @keyframes float3d {
            0%, 100% {
                transform: translateY(0) rotateX(0) rotateZ(0);
            }
            25% {
                transform: translateY(-15px) rotateX(10deg) rotateZ(5deg);
            }
            50% {
                transform: translateY(0) rotateX(0) rotateZ(0);
            }
            75% {
                transform: translateY(-15px) rotateX(-10deg) rotateZ(-5deg);
            }
        }

        .ai-avatar-inner {
            width: 100%;
            height: 100%;
            border: 3px solid #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3), inset 0 0 40px rgba(255, 255, 255, 0.1);
            position: relative;
            transform-style: preserve-3d;
            overflow: hidden;
        }

        .ai-avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .ai-avatar::before {
            content: '';
            position: absolute;
            width: 120%;
            height: 120%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: pulse3d 3s infinite;
        }

        @keyframes pulse3d {
            0%, 100% {
                transform: scale(1) rotateZ(0deg);
                opacity: 1;
            }
            50% {
                transform: scale(1.2) rotateZ(180deg);
                opacity: 0.3;
            }
        }

        .ai-name {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #000000 0%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ai-subtitle {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .user-info {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 12px;
            text-align: center;
        }

        .user-status {
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .premium-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 11px;
            margin-top: 5px;
        }

        .free-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 11px;
            margin-top: 5px;
        }

        .nav-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .nav-item {
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: rgba(0, 0, 0, 0.8);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            transform: translateZ(0);
        }

        .nav-item:hover {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(0, 0, 0, 0.6);
            color: #000000;
            transform: translateX(8px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .nav-item.active {
            background: rgba(0, 0, 0, 0.8);
            border-color: rgba(0, 0, 0, 1);
            color: #ffffff;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
        }

        .premium-btn {
            padding: 14px 18px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000000;
            border: 2px solid #FFA500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 12px;
            box-shadow: 0 8px 20px rgba(255, 165, 0, 0.3);
        }

        .premium-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 165, 0, 0.4);
        }

        .logout-btn {
            padding: 12px 18px;
            background: rgba(255, 50, 50, 0.2);
            color: #ff5555;
            border: 2px solid rgba(255, 50, 50, 0.5);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 12px;
        }

        .logout-btn:hover {
            background: rgba(255, 50, 50, 0.3);
            border-color: rgba(255, 50, 50, 0.8);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: slideInRight 0.8s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px) rotateY(-20deg);
            }
            to {
                opacity: 1;
                transform: translateX(0) rotateY(0);
            }
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .header-btn {
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            color: #000000;
            position: relative;
        }

        .header-btn:hover {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            transform: scale(1.15) rotate(10deg);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-title {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 20px;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 15px;
            animation: messageIn 0.4s ease-out;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(20px) rotateX(20deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 500px;
            padding: 15px 20px;
            border-radius: 15px;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .message.ai .message-content {
            background: rgba(0, 0, 0, 0.1);
            border: 2px solid rgba(0, 0, 0, 0.2);
            color: #000000;
            font-weight: 500;
        }

        .message.user .message-content {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(0, 0, 0, 1);
            color: #ffffff;
            font-weight: 600;
        }

        .premium-response .message-content {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 165, 0, 0.1) 100%);
            border: 2px solid rgba(255, 165, 0, 0.3);
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #000000;
            font-size: 14px;
            outline: none;
            font-weight: 500;
        }

        .chat-input::placeholder {
            color: rgba(0, 0, 0, 0.4);
        }

        .input-action {
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            color: #000000;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .input-action:hover {
            transform: scale(1.25) rotate(10deg);
        }

        .input-action.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            border: 2px solid rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            color: #ffffff;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            font-weight: bold;
            transform: translateZ(0);
        }

        .send-btn:hover {
            transform: translateY(-5px) scale(1.1) rotateZ(10deg);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .send-btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        /* Login Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid #000000;
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-title {
            font-size: 32px;
            font-weight: 900;
            color: #000000;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal-subtitle {
            font-size: 14px;
            color: #666666;
            margin-bottom: 30px;
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #000000;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.05);
            color: #000000;
        }

        .modal-input:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.1);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        .modal-btn {
            width: 100%;
            padding: 14px;
            background: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .modal-btn:hover {
            background: #333333;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transform: translateY(-3px);
        }

        .modal-toggle {
            text-align: center;
            color: #666666;
            font-size: 13px;
        }

        .modal-toggle a {
            color: #000000;
            font-weight: 900;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Premium Modal */
        .premium-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease-out;
        }

        .premium-modal-content {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: 4px solid #000000;
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(255, 165, 0, 0.4);
            animation: slideUp 0.4s ease-out;
            text-align: center;
            color: #000000;
        }

        .premium-modal-title {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .premium-features {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: left;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            font-weight: 700;
            font-size: 16px;
        }

        .feature-item:last-child {
            margin-bottom: 0;
        }

        .premium-price {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .premium-price-sub {
            font-size: 14px;
            font-weight: 700;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .premium-pay-btn {
            width: 100%;
            padding: 18px;
            background: #000000;
            color: #FFD700;
            border: 3px solid #000000;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            font-size: 16px;
