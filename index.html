<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ STORE - Katalog Akun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .drop { position: absolute; bottom: 100%; width: 1px; height: 25px; background: rgba(0, 191, 255, 0.3); animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sold-overlay { background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; position: absolute; inset: 0; z-index: 10; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div class="rain" id="rain-container"></div>

    <header class="p-12 text-center">
        <h1 class="text-5xl font-black italic tracking-tighter text-blue-500 shadow-blue-500/20">XYZ STORE</h1>
        <p class="text-[10px] text-slate-500 tracking-[0.5em] uppercase mt-2 font-bold">Official Digital Marketplace</p>
    </header>

    <main class="max-w-5xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="product-list">
        </main>

    <footer class="mt-20 text-center py-10 border-t border-white/5">
        <p class="text-slate-400 text-sm mb-4">Payment: DANA / GOPAY (085183122570)</p>
        <button onclick="window.open('https://wa.me/6285183122570')" class="glass px-8 py-3 rounded-full text-sm font-bold hover:bg-blue-500/20 transition">
            Hubungi Operator: 085183122570
        </button>
    </footer>

    <script>
        // ==========================================
        // BAGIAN EDIT PRODUK (DI SINI TEMPATNYA, MIN!)
        // ==========================================
        const DATA_PRODUK = [
            {
                nama: "AKUN FC MOBILE V1",
                harga: "150.000",
                desc: "Full Icon, OVR 100+, Login FB, Aman 100%.",
                sold: false, // Ganti jadi true kalau sudah laku
                foto: [
                    "https://placehold.co/600x400/0f172a/3b82f6?text=Foto+Akun+1",
                    "https://placehold.co/600x400/0f172a/3b82f6?text=Foto+Akun+2"
                ]
            },
            {
                nama: "AKUN FC MOBILE V2",
                harga: "85.000",
                desc: "SQUAD Gacor, Koin Melimpah, No Minus.",
                sold: true, // Contoh kalau sudah sold
                foto: [
                    "https://placehold.co/600x400/0f172a/ef4444?text=AKUN+SOLD"
                ]
            },
            // Copy paste dari { sampe } untuk tambah produk baru
        ];

        // ==========================================
        // JANGAN EDIT KODE DI BAWAH INI
        // ==========================================
        const WA_NOMOR = "6285183122570";
        const container = document.getElementById('product-list');

        DATA_PRODUK.forEach((item) => {
            let slides = item.foto.map(f => `<img src="${f}" class="w-full h-60 object-cover flex-shrink-0">`).join('');
            
            container.innerHTML += `
                <div class="glass rounded-3xl overflow-hidden flex flex-col relative group transition hover:border-blue-500/50">
                    ${item.sold ? '<div class="sold-overlay"><span class="text-red-500 font-black text-4xl border-4 border-red-500 px-4 py-2 rotate-[-15deg]">SOLD</span></div>' : ''}
                    <div class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar bg-black">${slides}</div>
                    <div class="p-6">
                        <h3 class="font-bold text-xl text-blue-400 italic mb-2">${item.nama}</h3>
                        <p class="text-slate-500 text-sm mb-6 leading-relaxed">${item.desc}</p>
                        <div class="flex justify-between items-center pt-4 border-t border-white/5">
                            <span class="font-black text-2xl text-green-400 font-mono">Rp${item.harga}</span>
                            ${!item.sold ? 
                                `<button onclick="beli('${item.nama}', '${item.harga}')" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl text-xs font-black tracking-widest transition">BELI</button>` : 
                                '<span class="text-slate-600 font-bold uppercase text-xs">TERJUAL</span>'}
                        </div>
                    </div>
                </div>
            `;
        });

        function beli(n, h) {
            window.open(`https://wa.me/${WA_NOMOR}?text=Halo Min, saya mau beli *${n}* seharga *Rp${h}*. Ready?`, '_blank');
        }

        // Animasi Hujan
        const rainContainer = document.getElementById('rain-container');
        for (let i = 0; i < 35; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            rainContainer.appendChild(drop);
        }
    </script>
</body>
</html>
