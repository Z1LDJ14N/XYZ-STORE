<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ - Store</title>
    <style>
        /* TEMA HITAM PUTIH */
        body { margin: 0; font-family: 'Courier New', Courier, monospace; background: #fff; color: #000; overflow-x: hidden; }
        button { font-family: 'Courier New', Courier, monospace; cursor: pointer; border: 2px solid #000; background: #fff; color: #000; padding: 10px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #000; color: #fff; }
        
        /* LOADING */
        #loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; }
        .road { width: 100%; border-bottom: 3px dashed #000; position: absolute; top: 55%; }
        .car { font-size: 4rem; position: absolute; top: 42%; left: -15%; animation: ngebut 1.5s infinite linear; filter: grayscale(100%) contrast(200%); }
        @keyframes ngebut { 0% { left: -15%; } 100% { left: 110%; } }

        /* LAYOUT UTAMA */
        #main-app { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 4px solid #000; padding-bottom: 10px; text-align: center; letter-spacing: 5px; text-transform: uppercase; }
        
        /* MENU KATEGORI */
        #category-menu { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 30px; }
        .cat-btn { padding: 20px; font-size: 1.5rem; text-transform: uppercase; }

        /* HALAMAN PRODUK */
        #product-page { display: none; }
        .header-action { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* GRID PRODUK */
        #product-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .product-card { border: 2px solid #000; padding: 10px; position: relative; display: flex; flex-direction: column; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-bottom: 2px solid #000; margin-bottom: 10px; filter: grayscale(100%); }
        .product-card.sold img { opacity: 0.3; }
        .sold-badge { position: absolute; top: 20px; left: 0; width: 100%; background: #000; color: #fff; text-align: center; font-size: 1.5rem; padding: 10px 0; transform: rotate(-15deg); font-weight: bold; pointer-events: none; }
        .card-actions { display: flex; gap: 5px; margin-top: auto; padding-top: 10px; }
        .card-actions button { flex: 1; font-size: 0.8rem; padding: 5px; }
        .btn-buy { background: #000; color: #fff; }

        /* MODAL TAMBAH PRODUK */
        #add-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { border: 4px solid #000; padding: 20px; width: 90%; max-width: 400px; background: #fff; }
        .modal-content input, .modal-content textarea { width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 10px; border: 2px solid #000; font-family: 'Courier New', Courier, monospace; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; }
    </style>
</head>
<body>

    <div id="loader">
        <h2>LOADING...</h2>
        <div class="road"></div>
        <div class="car">🏎️</div>
    </div>

    <div id="main-app">
        <div id="home-page">
            <h1>WEB XYZ</h1>
            <p style="text-align:center;">Pilih Kategori Game</p>
            <div id="category-menu">
                <button class="cat-btn" onclick="openCategory('FREE FIRE')">FREE FIRE</button>
                <button class="cat-btn" onclick="openCategory('FC MOBILE')">FC MOBILE</button>
                <button class="cat-btn" onclick="openCategory('MOBILE LEGENDS')">MOBILE LEGENDS</button>
                <button class="cat-btn" onclick="openCategory('ARENA BREAKOUT')">ARENA BREAKOUT</button>
            </div>
        </div>

        <div id="product-page">
            <div class="header-action">
                <button onclick="goHome()">◄ KEMBALI</button>
                <h2 id="cat-title" style="margin:0;">KATEGORI</h2>
                <button onclick="openModal()" style="font-size:1.5rem; padding: 5px 15px;">+</button>
            </div>
            <div id="product-list">
                </div>
        </div>
    </div>

    <div id="add-modal">
        <div class="modal-content">
            <h3>TAMBAH AKUN BARU</h3>
            <label>Nama/Spesifikasi Akun:</label>
            <input type="text" id="p-name" placeholder="Contoh: Akun Sultan EPEP">
            
            <label>Upload Foto:</label>
            <input type="file" id="p-image" accept="image/*">
            
            <div class="modal-actions">
                <button onclick="closeModal()">BATAL</button>
                <button onclick="saveProduct()" style="background:#000; color:#fff;">SIMPAN</button>
            </div>
        </div>
    </div>

    <script>
        // Simulasi Database menggunakan LocalStorage (Tersimpan di HP/Browser pengguna)
        let db = JSON.parse(localStorage.getItem('xyz_db')) || {
            'FREE FIRE': [], 'FC MOBILE': [], 'MOBILE LEGENDS': [], 'ARENA BREAKOUT': []
        };
        let currentCategory = '';

        // Menghilangkan Loading
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }, 2000);

        // Navigasi
        function openCategory(catName) {
            currentCategory = catName;
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('product-page').style.display = 'block';
            document.getElementById('cat-title').innerText = catName;
            renderProducts();
        }

        function goHome() {
            document.getElementById('product-page').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
        }

        // Buka/Tutup Modal
        function openModal() { document.getElementById('add-modal').style.display = 'flex'; }
        function closeModal() { 
            document.getElementById('add-modal').style.display = 'none'; 
            document.getElementById('p-name').value = '';
            document.getElementById('p-image').value = '';
        }

        // Simpan Produk dengan konversi foto ke format Base64
        function saveProduct() {
            const name = document.getElementById('p-name').value;
            const fileInput = document.getElementById('p-image');

            if(!name) return alert('Nama akun harus diisi!');

            if(fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    db[currentCategory].push({ id: Date.now(), name: name, image: e.target.result, status: 'available' });
                    saveToDB();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                // Jika tidak upload foto
                db[currentCategory].push({ id: Date.now(), name: name, image: '', status: 'available' });
                saveToDB();
            }
        }

        function saveToDB() {
            localStorage.setItem('xyz_db', JSON.stringify(db));
            closeModal();
            renderProducts();
        }

        // Tampilkan Produk
        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            
            if(db[currentCategory].length === 0) {
                list.innerHTML = '<p>Belum ada akun yang dijual.</p>';
                return;
            }

            db[currentCategory].forEach((prod, index) => {
                const isSold = prod.status === 'sold';
                const card = document.createElement('div');
                card.className = 'product-card ' + (isSold ? 'sold' : '');
                
                const imgSrc = prod.image ? prod.image : 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZWVlIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtc2l6ZT0iMTIiIHRleHQtYW5jaG9yPSJtaWRkbGUiPmdhbWJhciBwb3N0aW5nYW48L3RleHQ+PC9zdmc+';

                card.innerHTML = `
                    ${isSold ? '<div class="sold-badge">SOLD OUT</div>' : ''}
                    <img src="${imgSrc}" alt="${prod.name}">
                    <strong>${prod.name}</strong>
                    <div class="card-actions">
                        <button class="btn-buy" onclick="beliWA('${prod.name}')" ${isSold ? 'disabled' : ''}>BELI</button>
                        <button onclick="markSold(${index})" ${isSold ? 'disabled' : ''}>SOLD</button>
                        <button onclick="hapusProduk(${index})">HAPUS</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // Fitur WhatsApp
        function beliWA(namaProduk) {
            const waNumber = "6285183122570"; // Ubah 0 jadi 62
            const text = encodeURIComponent(`min stock akun ${namaProduk} ini masih tersedia?`);
            window.open(`https://wa.me/${waNumber}?text=${text}`, '_blank');
        }

        // Fitur Sold & Hapus
        function markSold(index) {
            db[currentCategory][index].status = 'sold';
            saveToDB();
        }

        function hapusProduk(index) {
            if(confirm('Yakin mau hapus akun ini?')) {
                db[currentCategory].splice(index, 1);
                saveToDB();
            }
        }
    </script>
</body>
</html>
