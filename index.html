<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Akun & Layanan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            overflow-x: hidden;
            position: relative;
        }
        /* Efek Animasi Hujan */
        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .drop {
            position: absolute;
            bottom: 100%;
            width: 2px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            animation: fall linear infinite;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <div class="rain" id="rain-container"></div>

    <header class="bg-slate-900 border-b border-slate-800 p-6 text-center">
        <h1 class="text-3xl font-bold text-blue-400 tracking-wider">ZILDJIAN STORE</h1>
        <p class="text-slate-400 mt-2">Pusat Stok Akun Berkualitas</p>
    </header>

    <main class="flex-grow max-w-5xl mx-auto p-6 w-full">
        
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-6">
            </div>

    </main>

    <footer class="bg-slate-900 border-t border-slate-800 p-6 mt-12 text-center">
        <p class="mb-4 text-slate-300">Pembayaran didukung via <strong>Dana & Gopay</strong></p>
        <button onclick="hubungiOperator()" class="bg-slate-700 hover:bg-slate-600 text-white px-6 py-2 rounded-lg font-semibold transition">
            📞 Hubungi Operator Jika Ada Masalah
        </button>
        <p class="text-sm text-slate-500 mt-6">© 2026 Zildjian Store.</p>
    </footer>

    <script>
        // 1. DATA PRODUK (LU BISA TAMBAH/EDIT PRODUK DI SINI)
        const products = [
            {
                id: 1,
                name: "Akun Game Level Max",
                desc: "Full akses, belum terikat email. Garansi anti hackback.",
                price: "50.000"
            },
            {
                id: 2,
                name: "Akun Premium 1 Bulan",
                desc: "Privat, bukan sharing. Bisa ganti password dan profil.",
                price: "25.000"
            },
            {
                id: 3,
                name: "Stok Akun Random",
                desc: "Gacha akun tier tinggi, dijamin work 100%.",
                price: "15.000"
            }
        ];

        // 2. RENDER PRODUK KE HTML
        const productGrid = document.getElementById('product-grid');
        products.forEach(item => {
            const card = document.createElement('div');
            card.className = "bg-slate-800 border border-slate-700 rounded-xl p-5 hover:border-blue-500 transition duration-300";
            card.innerHTML = `
                <h2 class="text-xl font-bold text-white mb-2">${item.name}</h2>
                <p class="text-slate-400 text-sm mb-4 h-12">${item.desc}</p>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-lg font-bold text-green-400">Rp${item.price}</span>
                    <button onclick="beliProduk('${item.name}', '${item.price}')" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-medium transition">
                        Beli via WA
                    </button>
                </div>
            `;
            productGrid.appendChild(card);
        });

        // 3. FUNGSI WHATSAPP
        const nomorWA = "6285183122570";

        function beliProduk(nama, harga) {
            const pesan = `Halo gan, gw mau beli produk *${nama}* seharga *Rp${harga}*. Mau bayar pakai Dana/Gopay nih, boleh minta nomornya?`;
            const url = `https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`;
            window.open(url, '_blank');
        }

        function hubungiOperator() {
            const pesan = `Halo operator, gw butuh bantuan terkait store-nya.`;
            const url = `https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`;
            window.open(url, '_blank');
        }

        // 4. ANIMASI HUJAN
        const rainContainer = document.getElementById('rain-container');
        const numDrops = 100; // Jumlah rintik hujan

        for (let i = 0; i < numDrops; i++) {
            const drop = document.createElement('div');
            drop.classList.add('drop');
            // Random posisi horizontal
            drop.style.left = `${Math.random() * 100}vw`;
            // Random durasi jatuh (kecepatan)
            drop.style.animationDuration = `${Math.random() * 1 + 0.5}s`;
            // Random delay biar gak turun barengan
            drop.style.animationDelay = `${Math.random() * 2}s`;
            rainContainer.appendChild(drop);
        }
    </script>
</body>
</html>
